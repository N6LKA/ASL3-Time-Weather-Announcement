# ============================================================================
# ASL3 Time and Weather Announcement - Configuration
# https://github.com/N6LKA/ASL3-Time-Weather-Announcement
#
# Install location: /etc/asterisk/scripts/saytime-weather/weather.ini
# ============================================================================

# ----------------------------------------------------------------------------
# WEATHER DATA PROVIDER
# ----------------------------------------------------------------------------
# auto      - Use NOAA METAR for airport codes, Open-Meteo for ZIP/postal codes
# metar     - Force NOAA METAR (best for ICAO airport codes)
# openmeteo - Force Open-Meteo (free, no API key required)
# tempest   - Use your WeatherFlow Tempest station (requires token below)
#
# Default: auto
DEFAULT_PROVIDER="auto"

# ----------------------------------------------------------------------------
# TEMPEST WEATHER STATION (optional)
# Required only when DEFAULT_PROVIDER="tempest"
# ----------------------------------------------------------------------------
# Get your API token at: https://tempestwx.com/settings/tokens
TempestToken=""

# Your Tempest station ID (leave blank to auto-detect from your account)
TempestStationID=""

# ----------------------------------------------------------------------------
# TEMPERATURE
# ----------------------------------------------------------------------------
# F = Fahrenheit, C = Celsius
# Default: F
Temperature_mode="F"

# ----------------------------------------------------------------------------
# WEATHER CONDITION ANNOUNCEMENT
# ----------------------------------------------------------------------------
# Announce current conditions (cloudy, rain, clear, etc.)
# Set to NO to announce temperature only
# Default: YES
process_condition="YES"

# ----------------------------------------------------------------------------
# ADDITIONAL ANNOUNCEMENTS (optional)
# ----------------------------------------------------------------------------
# Announce the "feels like" (apparent) temperature after the actual temperature
# Supported by: openmeteo, tempest  (not available from METAR)
# Default: no
ANNOUNCE_FEELS_LIKE="no"

# Announce relative humidity percentage
# Supported by: openmeteo, tempest  (not available from METAR)
# Default: no
ANNOUNCE_HUMIDITY="no"

# ----------------------------------------------------------------------------
# TIME FORMAT
# ----------------------------------------------------------------------------
# 12 = 12-hour format with AM/PM  (e.g. "Good morning, the time is 10 45 AM")
# 24 = 24-hour format              (e.g. "The time is 10 45")
# Default: 12
TIME_FORMAT="12"

# ----------------------------------------------------------------------------
# LOCATION (for postal/ZIP code lookups)
# ----------------------------------------------------------------------------
# Default country for ambiguous postal code lookups
# ISO 3166-1 alpha-2 country codes: us, ca, de, fr, gb, au, etc.
# Default: us
default_country="us"

# ----------------------------------------------------------------------------
# CACHE SETTINGS
# ----------------------------------------------------------------------------
# How fresh (in minutes) the temperature cache must be before weather.sh
# skips the API fetch. The systemd timer refreshes the cache every 10 minutes;
# this value should be slightly larger than that interval.
# Default: 12
CACHE_MAX_AGE_MIN="12"

# Path for the coordinate cache file (avoids repeated Nominatim lookups)
# Default: /etc/asterisk/scripts/saytime-weather/weather-coords.cache
COORD_CACHE="/etc/asterisk/scripts/saytime-weather/weather-coords.cache"

# ============================================================================
# TESTING
# ============================================================================
# Run weather.sh with the "v" argument to test without writing files:
#   /etc/asterisk/scripts/saytime-weather/weather.sh 90210 v
#   /etc/asterisk/scripts/saytime-weather/weather.sh KJFK v
#   /etc/asterisk/scripts/saytime-weather/weather.sh --no-cache 90210 v
#
# Check the debug log:
#   cat /tmp/weather-debug.log
# ============================================================================
